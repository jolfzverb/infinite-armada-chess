<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Armada Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="btn-sidebar-open" class="sidebar-open-btn">&raquo;</button>
  <aside class="sidebar" id="sidebar">
    <button id="btn-sidebar-close" class="sidebar-close-btn">&laquo;</button>
    <h1>Infinite<br>Armada<br>Chess</h1>
    <div id="captures" class="captures"></div>
    <p id="status" class="status-text"></p>
    <div class="btn-row" id="explore-buttons">
      <button id="btn-reset" title="Reset board">&#x21ba;</button>
      <button id="btn-rotate" title="Rotate board">&#x21c5;</button>
      <button id="btn-export" title="Export moves">&#x2197;</button>
      <button id="btn-import" title="Import moves">&#x2199;</button>
    </div>
    <div id="move-log" class="move-log"></div>
    <p class="hint">Scroll or &#x2191;&#x2193; to navigate<br>Click piece to select<br>Click target to move</p>
  </aside>
  <div id="app"></div>
  <aside class="sidebar-right" id="sidebar-right"></aside>
  <script type="module" src="main.ts"></script>
</body>
</html>
